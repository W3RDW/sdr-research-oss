name: Build & publish images

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: api
            image: sdr-research-api
            platforms: linux/amd64,linux/arm64
          - name: ui
            context: ui
            image: sdr-research-ui
            platforms: linux/amd64,linux/arm64
          - name: unified-sdr
            context: decoders/unified-sdr
            image: sdr-research-unified-sdr
            platforms: linux/amd64,linux/arm64
          - name: aprs
            context: decoders/aprs
            image: sdr-research-aprs
            platforms: linux/amd64,linux/arm64
          - name: cw
            context: decoders/cw
            image: sdr-research-cw
            platforms: linux/amd64,linux/arm64
          - name: voice
            context: decoders/voice
            image: sdr-research-voice
            platforms: linux/amd64,linux/arm64
          - name: pager
            context: decoders/pager
            image: sdr-research-pager
            platforms: linux/amd64,linux/arm64
          - name: eas
            context: decoders/eas
            image: sdr-research-eas
            platforms: linux/amd64,linux/arm64
          # acars + vdl2 disabled — `acarsdec` and `dumpvdl2` are not in
          # Debian apt; Dockerfiles need source-build. See decoders/{acars,vdl2}/README.md.
          # - name: acars
          #   context: decoders/acars
          #   image: sdr-research-acars
          #   platforms: linux/amd64
          # - name: vdl2
          #   context: decoders/vdl2
          #   image: sdr-research-vdl2
          #   platforms: linux/amd64
          - name: sstv
            context: decoders/sstv
            image: sdr-research-sstv
            platforms: linux/amd64,linux/arm64
          - name: spectrum-exporter
            context: decoders/spectrum-exporter
            image: sdr-research-spectrum-exporter
            platforms: linux/amd64,linux/arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
