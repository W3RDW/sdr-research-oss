name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check api/

  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      # `npm run lint` intentionally omitted — eslint not yet wired into deps.
      # See issue: add eslint config + flat-config + plugin:react-hooks/recommended.
      - run: npm run build

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/sdr-research
      - run: helm template sdr deploy/helm/sdr-research > /tmp/render.yaml
      - run: helm template sdr deploy/helm/sdr-research --set unifiedSdr.osmosdrArgs="rtl=0" --set repeaterbook.enabled=true --set repeaterbook.apiKey=test --set alerts.enabled=true --set alerts.webhookUrl=http://example.com > /tmp/render-full.yaml
