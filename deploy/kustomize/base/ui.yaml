apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/component: ui
    spec:
      containers:
        - name: ui
          image: ghcr.io/w3rdw/sdr-research-ui
          imagePullPolicy: IfNotPresent
          ports:
            - {containerPort: 80, name: http}
---
apiVersion: v1
kind: Service
metadata:
  name: ui
spec:
  selector:
    app.kubernetes.io/component: ui
  ports:
    - {port: 80, targetPort: http, name: http}
