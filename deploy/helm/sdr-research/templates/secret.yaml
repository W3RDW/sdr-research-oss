apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels: {{- include "sdr-research.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ randAlphaNum 24 | quote }}
{{- if and .Values.repeaterbook.enabled (not .Values.repeaterbook.existingSecret) }}
  repeaterbook-api-key: {{ .Values.repeaterbook.apiKey | quote }}
{{- end }}
{{- if and .Values.alerts.enabled (not .Values.alerts.existingSecret) }}
  alert-webhook-url: {{ .Values.alerts.webhookUrl | quote }}
{{- end }}
