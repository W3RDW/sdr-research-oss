apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ui
  labels: {{- include "sdr-research.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: sdr-research
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sdr-research
        app.kubernetes.io/component: ui
    spec:
      containers:
        - name: ui
          image: "{{ .Values.images.ui.repository }}:{{ .Values.images.ui.tag }}"
          imagePullPolicy: {{ .Values.images.ui.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ui
  labels: {{- include "sdr-research.labels" . | nindent 4 }}
spec:
  type: {{ .Values.ui.service.type }}
  selector:
    app.kubernetes.io/name: sdr-research
    app.kubernetes.io/component: ui
  ports:
    - port: {{ .Values.ui.service.port }}
      targetPort: http
      name: http
