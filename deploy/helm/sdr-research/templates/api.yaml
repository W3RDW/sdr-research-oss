apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-artifacts
  labels: {{- include "sdr-research.labels" . | nindent 4 }}
spec:
  accessModes: [{{ .Values.api.artifacts.accessMode }}]
  {{- if .Values.api.artifacts.storageClass }}
  storageClassName: {{ .Values.api.artifacts.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.api.artifacts.size }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-api-cache
  labels: {{- include "sdr-research.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.api.cache.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels: {{- include "sdr-research.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: sdr-research
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sdr-research
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.images.api.repository }}:{{ .Values.images.api.tag }}"
          imagePullPolicy: {{ .Values.images.api.pullPolicy }}
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: {{ include "sdr-research.databaseUrl" . | quote }}
            - name: CORS_ORIGINS
              value: {{ .Values.api.cors.origins | join "," | quote }}
            - name: STATION_CALLSIGN
              value: {{ .Values.station.callsign | quote }}
            - name: STATION_GRID
              value: {{ .Values.station.grid | quote }}
            - name: STATION_LAT
              value: {{ .Values.station.latitude | quote }}
            - name: STATION_LON
              value: {{ .Values.station.longitude | quote }}
            - name: OPERATOR_EMAIL
              value: {{ .Values.station.operatorEmail | quote }}
            {{- if .Values.repeaterbook.enabled }}
            - name: REPEATERBOOK_ENABLED
              value: "true"
            - name: REPEATERBOOK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-secrets" .Release.Name) .Values.repeaterbook.existingSecret }}
                  key: repeaterbook-api-key
            - name: REPEATERBOOK_USER_AGENT
              value: {{ .Values.repeaterbook.userAgent | quote }}
            - name: REPEATERBOOK_EMAIL
              value: {{ .Values.repeaterbook.email | quote }}
            - name: REPEATERBOOK_LATITUDE
              value: {{ .Values.repeaterbook.latitude | quote }}
            - name: REPEATERBOOK_LONGITUDE
              value: {{ .Values.repeaterbook.longitude | quote }}
            - name: REPEATERBOOK_RADIUS_MILES
              value: {{ .Values.repeaterbook.radiusMiles | quote }}
            - name: REPEATERBOOK_STATES
              value: {{ .Values.repeaterbook.states | quote }}
            - name: REPEATERBOOK_SYNC_HOURS
              value: {{ .Values.repeaterbook.syncHours | quote }}
            {{- end }}
            {{- if .Values.alerts.enabled }}
            - name: ALERT_CALLSIGNS
              value: {{ .Values.alerts.callsigns | quote }}
            - name: ALERT_KEYWORDS
              value: {{ .Values.alerts.keywords | quote }}
            - name: ALERT_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-secrets" .Release.Name) .Values.alerts.existingSecret }}
                  key: alert-webhook-url
            {{- end }}
            {{- if .Values.ollama.enabled }}
            - name: OLLAMA_ENABLED
              value: "true"
            - name: OLLAMA_URL
              value: {{ .Values.ollama.url | quote }}
            - name: OLLAMA_MODEL
              value: {{ .Values.ollama.model | quote }}
            - name: OLLAMA_TIMEOUT_SECONDS
              value: {{ .Values.ollama.timeoutSeconds | quote }}
            - name: OLLAMA_MAX_TAGS
              value: {{ .Values.ollama.maxTags | quote }}
            - name: OLLAMA_MAX_PER_CYCLE
              value: {{ .Values.ollama.maxPerCycle | quote }}
            {{- end }}
            - name: CACHE_PATH
              value: /cache
            - name: TEXT_BASE_PATH
              value: /data/text
            - name: HF_TEXT_BASE_PATH
              value: /data/hf/text
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: artifacts
              mountPath: /data
            - name: cache
              mountPath: /cache
          resources: {{- toYaml .Values.api.resources | nindent 12 }}
          readinessProbe:
            httpGet: {path: /api/v1/health, port: http}
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /api/v1/health, port: http}
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-artifacts
        - name: cache
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-api-cache
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
  labels: {{- include "sdr-research.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  selector:
    app.kubernetes.io/name: sdr-research
    app.kubernetes.io/component: api
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      name: http
